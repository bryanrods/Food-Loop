<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobre Nosotros - Food Loop</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D6A4F">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar" id="navbar-placeholder"></header>

    <main>
        <!-- SOBRE NOSOTROS -->
        <section id="about" class="about-section" style="padding-top:150px;">
            <div class="about-container">
                <div class="about-content">
                    <h2 class="section-title">Sobre <span>Food Loop</span></h2>
                    <p class="about-text">
                        Nuestro proyecto integrador nace de la necesidad de transformar y mejorar las prácticas de
                        negocio en comercios locales,
                        enfrentando uno de los problemas más comunes, el desperdicio de alimentos.
                    </p>

                    <!-- Botón centrado -->
                    <button class="cta-btn" onclick="window.location.href='comenzar.html'">Comenzar Ahora</button>
                </div>
                <div class="about-visual">
                    <div class="swiper teamSwiper">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide">
                                <img src="icons/pinacho.jpeg" alt="Equipo"
                                    onerror="this.style.display='none'; this.parentElement.querySelector('.team-placeholder').style.display='flex';">
                            </div>
                            <div class="swiper-slide">
                                <img src="icons/les.png" alt="Oficina"
                                    onerror="this.style.display='none'; this.parentElement.querySelector('.team-placeholder').style.display='flex';">
                            </div>
                            <div class="swiper-slide">
                                <img src="icons/sebas.png" alt="Impacto"
                                    onerror="this.style.display='none'; this.parentElement.querySelector('.team-placeholder').style.display='flex';">
                            </div>
                        </div>
                        <div class="swiper-pagination"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2025 Food Loop Technologies. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
